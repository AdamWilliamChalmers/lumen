<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=400" />
  <title>Lumen</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <header class="popup-header">
      <span class="wordmark">Lumen</span>
    </header>

    <section class="section">
      <h2>This session</h2>
      <div id="sparkline" class="sparkline"></div>
      <div class="session-meta">
        <span id="session-shape">—</span>
        <span id="session-duration">0 min</span>
      </div>
    </section>

    <section class="section">
      <h2>My preferences</h2>
      <ul id="exemptions-list" class="exemptions-list"></ul>
      <p class="hint">Edit goals at <a href="https://lumen.so/dashboard" target="_blank">lumen.so/dashboard</a></p>
    </section>

    <section class="section">
      <h2>My week</h2>
      <a class="dashboard-link" href="https://lumen.so/dashboard" target="_blank">Open dashboard →</a>
    </section>
  </div>
  <script src="popup.js"></script>
</body>
</html>
