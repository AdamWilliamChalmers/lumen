<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen — static mark variants</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --dark: #181816;
    --teal: #1D9E75;
    --teal-dim: rgba(29,158,117,0.20);
    --white: #ffffff;
    --gray: #2C2C2A;
  }
  body {
    background: var(--dark);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    color: var(--white);
    padding: 56px 48px;
    display: flex;
    flex-direction: column;
    gap: 64px;
  }
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
    margin-bottom: 28px;
  }
  .row { display: flex; align-items: center; gap: 40px; flex-wrap: wrap; }
  .row.bottom { align-items: flex-end; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .tag {
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.28);
  }

  /* ── Mark component ── */
  .mark { position: relative; flex-shrink: 0; }
  .mark .sq-you {
    position: absolute;
    background: var(--white);
    border-radius: calc(var(--sz) * 0.11);
  }
  .mark .sq-ai {
    position: absolute;
    border: calc(var(--sz) * 0.034) solid var(--teal);
    background: transparent;
    border-radius: calc(var(--sz) * 0.11);
  }
  .mark .inter {
    position: absolute;
    background: var(--teal);
    opacity: 0.20;
    border-radius: calc(var(--sz) * 0.04);
  }

  /* ── Wordmark lockup ── */
  .lockup { display: flex; align-items: center; gap: 14px; }
  .wm-text {
    font-weight: 300;
    letter-spacing: -0.5px;
    color: var(--white);
    line-height: 1;
  }

  /* ── Light swatch ── */
  .light-bg {
    background: #f5f5f3;
    border-radius: 12px;
    padding: 32px 36px;
    display: flex;
    gap: 36px;
    align-items: center;
    flex-wrap: wrap;
  }
  .light-bg .sq-you { background: var(--gray) !important; }
  .light-bg .wm-text { color: var(--gray) !important; }

  /* ── FAB ── */
  .fab {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: var(--gray);
    border: 1.5px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
  }
  .fab-sm {
    width: 40px;
    height: 40px;
    border-radius: 12px;
  }
</style>
</head>
<body>

<!-- 1. Master mark at hero size -->
<div>
  <div class="section-label">Master mark</div>
  <div class="col" style="align-items:flex-start;">

    <!-- 160px mark -->
    <div class="mark" style="--sz:160px; width:160px; height:160px;">
      <div class="inter"  style="width:48px;height:48px;top:56px;left:56px;"></div>
      <div class="sq-you" style="width:88px;height:88px;top:16px;left:16px;"></div>
      <div class="sq-ai"  style="width:88px;height:88px;top:56px;left:56px;"></div>
    </div>

  </div>
</div>

<!-- 2. Wordmark lockups -->
<div>
  <div class="section-label">Wordmark lockups</div>
  <div class="col" style="align-items:flex-start; gap:28px;">

    <div class="lockup">
      <div class="mark" style="--sz:48px; width:48px; height:48px;">
        <div class="inter"  style="width:14px;height:14px;top:17px;left:17px;"></div>
        <div class="sq-you" style="width:26px;height:26px;top:5px;left:5px;"></div>
        <div class="sq-ai"  style="width:26px;height:26px;top:17px;left:17px;"></div>
      </div>
      <span class="wm-text" style="font-size:32px;">lumen</span>
    </div>

    <div class="lockup">
      <div class="mark" style="--sz:32px; width:32px; height:32px;">
        <div class="inter"  style="width:9px;height:9px;top:11px;left:11px;"></div>
        <div class="sq-you" style="width:17px;height:17px;top:3px;left:3px;"></div>
        <div class="sq-ai"  style="width:17px;height:17px;top:11px;left:11px;"></div>
      </div>
      <span class="wm-text" style="font-size:20px;">lumen</span>
    </div>

  </div>
</div>

<!-- 3. FAB versions (dark) -->
<div>
  <div class="section-label">FAB icon — dark</div>
  <div class="row bottom">

    <div class="col">
      <div class="fab" style="width:64px;height:64px;border-radius:18px;">
        <div class="mark" style="--sz:38px; width:38px; height:38px;">
          <div class="inter"  style="width:11px;height:11px;top:13px;left:13px;"></div>
          <div class="sq-you" style="width:21px;height:21px;top:4px;left:4px;"></div>
          <div class="sq-ai"  style="width:21px;height:21px;top:13px;left:13px;"></div>
        </div>
      </div>
      <span class="tag">64px</span>
    </div>

    <div class="col">
      <div class="fab">
        <div class="mark" style="--sz:30px; width:30px; height:30px;">
          <div class="inter"  style="width:9px;height:9px;top:10px;left:10px;"></div>
          <div class="sq-you" style="width:16px;height:16px;top:3px;left:3px;"></div>
          <div class="sq-ai"  style="width:16px;height:16px;top:10px;left:10px;"></div>
        </div>
      </div>
      <span class="tag">56px</span>
    </div>

    <div class="col">
      <div class="fab fab-sm">
        <div class="mark" style="--sz:22px; width:22px; height:22px;">
          <div class="inter"  style="width:7px;height:7px;top:8px;left:8px;"></div>
          <div class="sq-you" style="width:12px;height:12px;top:2px;left:2px;"></div>
          <div class="sq-ai"  style="width:12px;height:12px;top:8px;left:8px;"></div>
        </div>
      </div>
      <span class="tag">40px</span>
    </div>

  </div>
</div>

<!-- 4. Light background -->
<div>
  <div class="section-label">Light background</div>
  <div class="light-bg">

    <div class="lockup">
      <div class="mark" style="--sz:48px; width:48px; height:48px;">
        <div class="inter"  style="width:14px;height:14px;top:17px;left:17px;"></div>
        <div class="sq-you" style="width:26px;height:26px;top:5px;left:5px;"></div>
        <div class="sq-ai"  style="width:26px;height:26px;top:17px;left:17px;border-color:var(--teal);"></div>
      </div>
      <span class="wm-text" style="font-size:32px;">lumen</span>
    </div>

    <!-- FAB light -->
    <div class="col">
      <div style="width:56px;height:56px;border-radius:16px;background:#e8e8e6;border:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:center;">
        <div class="mark" style="--sz:30px; width:30px; height:30px;">
          <div class="inter"  style="width:9px;height:9px;top:10px;left:10px;"></div>
          <div class="sq-you" style="width:16px;height:16px;top:3px;left:3px;"></div>
          <div class="sq-ai"  style="width:16px;height:16px;top:10px;left:10px;border-color:var(--teal);"></div>
        </div>
      </div>
      <span class="tag" style="color:rgba(0,0,0,0.3);">FAB light</span>
    </div>

  </div>
</div>

<!-- 5. Size scale -->
<div>
  <div class="section-label">Scale — mark only</div>
  <div class="row bottom" style="gap:32px;">

    <div class="col">
      <div class="mark" style="--sz:96px;width:96px;height:96px;">
        <div class="inter"  style="width:28px;height:28px;top:34px;left:34px;"></div>
        <div class="sq-you" style="width:52px;height:52px;top:10px;left:10px;"></div>
        <div class="sq-ai"  style="width:52px;height:52px;top:34px;left:34px;"></div>
      </div>
      <span class="tag">96px</span>
    </div>

    <div class="col">
      <div class="mark" style="--sz:64px;width:64px;height:64px;">
        <div class="inter"  style="width:19px;height:19px;top:23px;left:23px;"></div>
        <div class="sq-you" style="width:35px;height:35px;top:7px;left:7px;"></div>
        <div class="sq-ai"  style="width:35px;height:35px;top:23px;left:23px;"></div>
      </div>
      <span class="tag">64px</span>
    </div>

    <div class="col">
      <div class="mark" style="--sz:40px;width:40px;height:40px;">
        <div class="inter"  style="width:12px;height:12px;top:14px;left:14px;"></div>
        <div class="sq-you" style="width:22px;height:22px;top:4px;left:4px;"></div>
        <div class="sq-ai"  style="width:22px;height:22px;top:14px;left:14px;"></div>
      </div>
      <span class="tag">40px</span>
    </div>

    <div class="col">
      <div class="mark" style="--sz:24px;width:24px;height:24px;">
        <div class="inter"  style="width:7px;height:7px;top:9px;left:9px;"></div>
        <div class="sq-you" style="width:13px;height:13px;top:2px;left:2px;"></div>
        <div class="sq-ai"  style="width:13px;height:13px;top:9px;left:9px;border-width:1.5px;"></div>
      </div>
      <span class="tag">24px</span>
    </div>

    <div class="col">
      <div class="mark" style="--sz:16px;width:16px;height:16px;">
        <div class="inter"  style="width:5px;height:5px;top:6px;left:6px;border-radius:1px;"></div>
        <div class="sq-you" style="width:9px;height:9px;top:1px;left:1px;border-radius:2px;"></div>
        <div class="sq-ai"  style="width:9px;height:9px;top:6px;left:6px;border-radius:2px;border-width:1.5px;"></div>
      </div>
      <span class="tag">16px</span>
    </div>

  </div>
</div>

</body>
</html>
